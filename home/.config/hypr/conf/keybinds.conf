$hyper = ALT_R

source = ~/.config/hypr/conf/keybinds/tiling.conf
source = ~/.config/hypr/conf/keybinds/clipboard.conf
source = ~/.config/hypr/conf/keybinds/media.conf
source = ~/.config/hypr/conf/keybinds/utils.conf

# Quit Hyprland
bind = $mainMod SHIFT CTRL, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Terminal
binds = $hyper, T, exec, $terminal start --cwd "$(sc terminal cwd)"

# Browser
bind = $hyper, B, exec, $browser
bind = $hyper SHIFT, B, exec, $browser --private-window

# Notes
bind = $hyper, O, exec, obsidian

# Password manager
bind = $hyper, slash, exec, bitwarden-desktop

bind = SUPER, E, exec, $fileManager


# Audio
bind = $hyper, V, exec, wezterm start --class wiremix-float -- wiremix -v output

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

